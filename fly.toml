# fly.toml app configuration file for pkgsite-mcp
#
# See https://fly.io/docs/reference/configuration/ for details.

app = 'pkgsite-mcp'
primary_region = 'iad'

[build]

[env]
  PKGSITE_BASE_URL = 'https://pkg.go.dev/v1beta'
  PKGSITE_CACHE_DISABLED = 'false'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '256mb'
  cpus = 1
  memory_mb = 256
